<!DOCTYPE html>
<html lang="fr" class="transition-colors duration-300">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TrombiFlow</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- SheetJS (XLSX) CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="min-h-screen flex flex-col bg-gray-50 dark:bg-slate-900 transition-colors duration-300">
    <header class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800 sticky top-0 z-50">
        <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <i data-lucide="users" class="w-8 h-8 text-blue-600"></i>
                <h1 class="text-xl font-bold tracking-tight dark:text-white">TrombiFlow</h1>
            </div>
            <div class="flex-1 max-w-md mx-8 hidden sm:block">
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i data-lucide="search" class="h-5 w-5 text-gray-400"></i>
                    </div>
                    <input type="text" id="searchInput" placeholder="Rechercher un élève..." class="block w-full pl-10 pr-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all sm:text-sm" disabled>
                </div>
            </div>
            <div class="flex items-center space-x-2 sm:space-x-4">
                <button id="themeToggle" class="p-2 rounded-lg text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800 transition-colors">
                    <i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i>
                    <i data-lucide="moon" class="w-5 h-5 block dark:hidden"></i>
                </button>
                <button id="uploadBtn" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md shadow-sm text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                    <i data-lucide="upload" class="w-4 h-4 mr-2"></i>
                    <span class="hidden xs:inline">Importer</span>
                </button>
                <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" class="hidden">
            </div>
        </nav>
    </header>

    <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        <!-- Empty State -->
        <div id="emptyState" class="flex flex-col items-center justify-center py-24 text-center">
            <div class="bg-blue-100 dark:bg-blue-900/30 rounded-full p-6 mb-4">
                <i data-lucide="file-spreadsheet" class="w-12 h-12 text-blue-600"></i>
            </div>
            <h2 class="text-2xl font-semibold text-gray-900 dark:text-white mb-2">Prêt à commencer ?</h2>
            <p class="text-gray-500 dark:text-gray-400 max-w-sm mx-auto mb-8">
                Importez un fichier Excel (.xlsx) ou CSV contenant la liste de vos élèves pour générer automatiquement le trombinoscope.
            </p>
            <button onclick="document.getElementById('fileInput').click()" class="inline-flex items-center px-6 py-3 border border-transparent text-base font-medium rounded-lg shadow-sm text-white bg-blue-600 hover:bg-blue-700 transition-colors">
                <i data-lucide="upload" class="w-5 h-5 mr-2"></i>
                Choisir un fichier
            </button>
        </div>

        <!-- Content Grid -->
        <div id="contentSection" class="hidden space-y-8">
            <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
                <h2 class="text-2xl font-bold text-gray-900 dark:text-white" id="statsTitle">Élèves (0)</h2>
                <div class="sm:hidden">
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i data-lucide="search" class="h-5 w-5 text-gray-400"></i>
                        </div>
                        <input type="text" id="mobileSearchInput" placeholder="Rechercher..." class="block w-full pl-10 pr-3 py-2 border border-gray-300 dark:border-gray-700 rounded-lg bg-gray-50 dark:bg-gray-800 dark:text-white focus:outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                    </div>
                </div>
            </div>
            <div id="studentsGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6">
                <!-- Students cards will be injected here -->
            </div>
        </div>
    </main>

    <footer class="bg-white dark:bg-gray-900 border-t border-gray-200 dark:border-gray-800 py-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-gray-500 dark:text-gray-400 text-sm">
            <p>&copy; 2026 TrombiFlow. Développé avec passion.</p>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/excel-parser.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
